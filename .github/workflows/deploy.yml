name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  web-deploy:
    name: 🎉 Build and Deploy React App
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: 📦 Install Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: 🔨 Build Project
      working-directory: ./frontend
      run: |
        npm run build
        echo "<!-- Deploy $(date +%s) -->" >> dist/index.html
      
    - name: 🚀 Install LFTP
      run: sudo apt-get update && sudo apt-get install -y lftp
      
    - name: 🚀 Sync files via LFTP (Clean Slate)
      env:
        FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        FTP_HOST: ${{ secrets.HOSTINGER_FTP_SERVER }}
      run: |
        lftp -c "
          set ssl:verify-certificate no
          set ftp:ssl-allow true
          open -u $FTP_USER,$FTP_PASSWORD $FTP_HOST
          mirror -R -v --delete --parallel=10 ./frontend/dist/ ./public_html/
          quit
        "
