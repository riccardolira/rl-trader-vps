name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  web-deploy:
    name: 🎉 Build and Deploy React App
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: 📦 Install Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: 🔨 Build Project
      working-directory: ./frontend
      run: |
        npm run build
        mv dist/index.html dist/index.php
        sed -i '1s/^/<?php header("Cache-Control: no-cache, must-revalidate"); header("Expires: Sat, 26 Jul 1997 05:00:00 GMT"); ?>\n/' dist/index.php
      
    - name: 🚀 Install LFTP
      run: sudo apt-get update && sudo apt-get install -y lftp
      
    - name: 🚀 Sync files via LFTP (Clean Slate)
      env:
        FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        FTP_HOST: ${{ secrets.HOSTINGER_FTP_SERVER }}
      run: |
        lftp -c "
          set cmd:fail-exit true
          set net:timeout 15
          set net:max-retries 3
          set ftp:passive-mode true
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set ssl:check-hostname no
          open -u $FTP_USER,$FTP_PASSWORD $FTP_HOST
          pwd
          ls -la
          mirror -R -v --delete --parallel=10 ./frontend/dist/ /home/u116771474/domains/clickandoffers.com/public_html/
          quit
        "

    - name: 🔍 Verify Live Deployment
      run: |
        echo "Fetching headers from https://clickandoffers.com"
        curl -I https://clickandoffers.com
        echo "Fetching content snippet..."
        curl -s https://clickandoffers.com | head -n 20
